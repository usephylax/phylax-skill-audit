name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  package:
    name: Package — test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run build

  site:
    name: Site — lint & build
    runs-on: ubuntu-latest
    needs: package
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            site/package-lock.json

      - name: Build local phylax-skill-audit package
        run: npm ci && npm run build

      - name: Install site deps (linked package)
        working-directory: site
        run: npm ci && npm install file:..

      - name: Lint site
        working-directory: site
        run: npm run lint

      - name: Build site
        working-directory: site
        run: npm run build
