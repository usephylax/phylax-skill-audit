name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  package:
    name: Package — test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run build

  skill-audit:
    name: Phylax — audit SKILL.md
    runs-on: ubuntu-latest
    needs: package
    steps:
      - uses: actions/checkout@v4

      - name: Pre-install audit (dogfood action)
        uses: ./
        with:
          skill: ./tests/fixtures/clean-skill.md
          fail-on: deny

  site:
    name: Site — lint & build
    runs-on: ubuntu-latest
    needs: package
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Lint & build site
        working-directory: site
        run: npm ci && npm run lint && npm run build

  deploy-site:
    name: Vercel — production
    runs-on: ubuntu-latest
    needs: site
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    env:
      VERCEL_ORG_ID: team_ucWusvgR1wz5RZDAEjhRrbHw
      VERCEL_PROJECT_ID: prj_IXqZJeV2j11eNwukrB50qKUZBRlE
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@54

      - name: Pull Vercel settings
        working-directory: site
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build for Vercel
        working-directory: site
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy to production
        working-directory: site
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
