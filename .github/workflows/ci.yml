name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  package:
    name: Package — test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run build

  site:
    name: Site — lint & build
    runs-on: ubuntu-latest
    needs: package
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Lint & build site
        working-directory: site
        run: npm ci && npm run lint && npm run build

  deploy-site:
    name: Vercel — production
    runs-on: ubuntu-latest
    needs: site
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      VERCEL_ORG_ID: team_ucWusvgR1wz5RZDAEjhRrbHw
      VERCEL_PROJECT_ID: prj_IXqZJeV2j11eNwukrB50qKUZBRlE
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@54

      - name: Link Vercel project
        working-directory: site
        run: |
          mkdir -p .vercel
          printf '%s\n' '{"projectId":"prj_IXqZJeV2j11eNwukrB50qKUZBRlE","orgId":"team_ucWusvgR1wz5RZDAEjhRrbHw"}' > .vercel/project.json

      - name: Build for Vercel
        working-directory: site
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        working-directory: site
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
