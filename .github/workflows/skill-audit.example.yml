name: Phylax self-audit (example)

on:
  pull_request:
    branches: [main]
    paths:
      - SKILL.md
      - rules/**
      - src/**
      - action.yml
      - scripts/action-run.sh
  workflow_dispatch:

jobs:
  audit-skill-md:
    name: Audit SKILL.md
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Phylax — pre-install audit
        uses: ./
        with:
          skill: ./SKILL.md
          fail-on: deny
