<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&family=IBM+Plex+Mono:wght@500;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { background:#08080C; }
  .banner {
    position:relative; width:2000px; height:800px; overflow:hidden;
    background:
      radial-gradient(900px 500px at 12% 50%, rgba(59,130,246,.14), transparent 65%),
      radial-gradient(700px 400px at 88% 30%, rgba(72,216,255,.08), transparent 60%),
      linear-gradient(135deg, #08080C 0%, #0A0E16 50%, #08080C 100%);
    font-family:'Inter',system-ui,sans-serif; color:#E8E8EC;
  }
  .grid {
    position:absolute; inset:0; opacity:.35;
    background-image:
      linear-gradient(rgba(59,130,246,.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,.06) 1px, transparent 1px);
    background-size:48px 48px;
    mask-image: linear-gradient(90deg, #000 30%, transparent 100%);
  }
  .glow-line {
    position:absolute; left:0; right:0; top:0; height:3px;
    background:linear-gradient(90deg, transparent, #3B82F6 20%, #48D8FF 50%, #3B82F6 80%, transparent);
  }
  .content {
    position:relative; z-index:2;
    display:flex; align-items:center; justify-content:space-between;
    height:100%; padding:0 100px;
  }
  .left { max-width:920px; }
  .brand { display:flex; align-items:center; gap:20px; margin-bottom:36px; }
  .brand svg { width:72px; height:72px; filter:drop-shadow(0 4px 24px rgba(72,216,255,.25)); }
  .brand-name {
    font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:36px;
    letter-spacing:.22em; text-transform:lowercase; color:#E8E8EC;
  }
  .version {
    display:inline-block; margin-left:16px; font-family:'IBM Plex Mono',monospace;
    font-size:15px; font-weight:600; letter-spacing:.12em; color:#08080C;
    background:linear-gradient(120deg,#48D8FF,#3B82F6); padding:6px 14px; border-radius:999px;
  }
  .headline {
    font-size:72px; font-weight:900; line-height:1.05; letter-spacing:-.03em;
    max-width:820px;
  }
  .headline .accent {
    background:linear-gradient(120deg,#48D8FF 0%,#3B82F6 100%);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .sub {
    margin-top:24px; font-size:28px; font-weight:500; color:#8888A0; line-height:1.4;
    max-width:700px;
  }
  .sub strong { color:#E8E8EC; font-weight:600; }

  .right { display:flex; flex-direction:column; gap:20px; align-items:flex-end; position:relative; z-index:3; }
  .verdict-row { display:flex; gap:14px; }
  .pill {
    font-family:'IBM Plex Mono',monospace; font-size:22px; font-weight:700;
    padding:14px 28px; border-radius:12px; letter-spacing:.06em;
  }
  .allow { background:rgba(34,197,94,.12); border:2px solid rgba(34,197,94,.45); color:#4ade80; }
  .warn  { background:rgba(234,179,8,.10); border:2px solid rgba(234,179,8,.4); color:#facc15; }
  .deny  { background:rgba(239,68,68,.14); border:2px solid rgba(239,68,68,.55); color:#f87171;
    box-shadow:0 0 40px rgba(239,68,68,.15); }
  .meta {
    margin-top:8px; font-family:'IBM Plex Mono',monospace; font-size:16px; color:#4A4A5A;
    text-align:right; line-height:1.6;
  }
  .meta span { color:#48D8FF; }

  .scan-ring {
    position:absolute; right:-180px; top:50%; transform:translateY(-50%);
    width:480px; height:480px; border-radius:50%;
    border:2px solid rgba(72,216,255,.08);
    box-shadow:0 0 100px rgba(59,130,246,.06);
    z-index:1; pointer-events:none;
  }
  .scan-ring::before {
    content:""; position:absolute; inset:32px; border-radius:50%;
    border:1px dashed rgba(72,216,255,.12);
  }
</style>
</head>
<body>
<div class="banner">
  <div class="glow-line"></div>
  <div class="grid"></div>
  <div class="scan-ring"></div>
  <div class="content">
    <div class="left">
      <div class="brand">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
          <defs>
            <linearGradient id="edge" x1="32" y1="3" x2="32" y2="61" gradientUnits="userSpaceOnUse">
              <stop offset="0" stop-color="#48D8FF"/><stop offset="1" stop-color="#3B82F6"/>
            </linearGradient>
            <radialGradient id="core" cx="32" cy="28" r="22" gradientUnits="userSpaceOnUse">
              <stop offset="0" stop-color="#11203A"/><stop offset="1" stop-color="#0E0E14"/>
            </radialGradient>
          </defs>
          <path d="M32 3 L55 11 V29 C55 44 45.5 54 32 60 C18.5 54 9 44 9 29 V11 Z" fill="url(#core)" stroke="url(#edge)" stroke-width="2.5" stroke-linejoin="round"/>
          <circle cx="32" cy="30" r="9.5" fill="none" stroke="#3B82F6" stroke-width="2"/>
          <circle cx="32" cy="30" r="5.5" fill="none" stroke="#48D8FF" stroke-width="1.4"/>
          <circle cx="32" cy="30" r="2" fill="#48D8FF"/>
          <path d="M27 47.5 L30.5 51 L38 43.5" fill="none" stroke="#48D8FF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="brand-name">phylax</span>
        <span class="version">v0.2.3</span>
      </div>
      <h1 class="headline">Audit skills<br><span class="accent">before install</span></h1>
      <p class="sub"><strong>ALLOW · WARN · DENY</strong> — deterministic verdicts with cited evidence. Free playground. Deep audit on Base x402.</p>
    </div>
    <div class="right">
      <div class="verdict-row">
        <div class="pill allow">ALLOW</div>
        <div class="pill warn">WARN</div>
        <div class="pill deny">DENY</div>
      </div>
      <div class="meta">
        usephylax.com<br>
        <span>#playground</span> · npm · x402
      </div>
    </div>
  </div>
</div>
</body>
</html>
