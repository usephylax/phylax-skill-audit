<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&family=IBM+Plex+Mono:wght@500;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { background:#08080C; }
  .card {
    position:relative; width:1200px; height:675px; overflow:hidden;
    background:
      radial-gradient(700px 400px at 15% 55%, rgba(59,130,246,.16), transparent 60%),
      radial-gradient(500px 320px at 90% 20%, rgba(72,216,255,.07), transparent 55%),
      #08080C;
    font-family:'Inter',system-ui,sans-serif; color:#E8E8EC;
  }
  .glow-line {
    position:absolute; left:0; right:0; top:0; height:2px;
    background:linear-gradient(90deg, transparent, #3B82F6, #48D8FF, #3B82F6, transparent);
  }
  .grid {
    position:absolute; inset:0; opacity:.28;
    background-image:
      linear-gradient(rgba(59,130,246,.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,.07) 1px, transparent 1px);
    background-size:40px 40px;
  }
  .wrap { position:relative; z-index:2; padding:52px 56px; height:100%; display:flex; flex-direction:column; }
  .brand { display:flex; align-items:center; gap:16px; }
  .brand svg { width:52px; height:52px; }
  .brand-name { font-family:'IBM Plex Mono',monospace; font-weight:700; font-size:22px; letter-spacing:.2em; }
  .headline { margin-top:36px; font-size:54px; font-weight:900; line-height:1.06; letter-spacing:-.03em; max-width:720px; }
  .headline .accent { color:#48D8FF; }
  .sub { margin-top:18px; font-size:22px; color:#8888A0; line-height:1.45; max-width:640px; font-weight:500; }
  .sub strong { color:#E8E8EC; font-weight:600; }
  .bottom { margin-top:auto; display:flex; align-items:flex-end; justify-content:space-between; }
  .pills { display:flex; gap:12px; }
  .pill {
    font-family:'IBM Plex Mono',monospace; font-size:17px; font-weight:700;
    padding:12px 22px; border-radius:10px; letter-spacing:.05em;
  }
  .allow { background:rgba(34,197,94,.12); border:2px solid rgba(34,197,94,.45); color:#4ade80; }
  .warn  { background:rgba(234,179,8,.10); border:2px solid rgba(234,179,8,.4); color:#facc15; }
  .deny  { background:rgba(239,68,68,.14); border:2px solid rgba(239,68,68,.55); color:#f87171; }
  .url { font-family:'IBM Plex Mono',monospace; font-size:20px; color:#48D8FF; font-weight:600; }
  .tick { position:absolute; top:48px; right:52px; width:28px; height:28px; border:2px solid rgba(72,216,255,.35); }
  .tick.tr { border-left:0; border-bottom:0; }
  .tick.bl { bottom:48px; left:52px; top:auto; border-right:0; border-top:0; }
</style>
</head>
<body>
<div class="card">
  <div class="glow-line"></div>
  <div class="grid"></div>
  <div class="tick tr"></div>
  <div class="tick bl"></div>
  <div class="wrap">
    <div class="brand">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
        <defs>
          <linearGradient id="edge" x1="32" y1="3" x2="32" y2="61" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#48D8FF"/><stop offset="1" stop-color="#3B82F6"/>
          </linearGradient>
          <radialGradient id="core" cx="32" cy="28" r="22" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#11203A"/><stop offset="1" stop-color="#0E0E14"/>
          </radialGradient>
        </defs>
        <path d="M32 3 L55 11 V29 C55 44 45.5 54 32 60 C18.5 54 9 44 9 29 V11 Z" fill="url(#core)" stroke="url(#edge)" stroke-width="2.5" stroke-linejoin="round"/>
        <circle cx="32" cy="30" r="9.5" fill="none" stroke="#3B82F6" stroke-width="2"/>
        <circle cx="32" cy="30" r="2" fill="#48D8FF"/>
        <path d="M27 47.5 L30.5 51 L38 43.5" fill="none" stroke="#48D8FF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="brand-name">phylax</span>
    </div>
    <h1 class="headline">Scan skills<br><span class="accent">before install</span></h1>
    <p class="sub"><strong>ALLOW · WARN · DENY</strong> — deterministic verdicts with cited evidence. SKILL.md, contracts, x402 endpoints on Base.</p>
    <div class="bottom">
      <div class="pills">
        <div class="pill allow">ALLOW</div>
        <div class="pill warn">WARN</div>
        <div class="pill deny">DENY</div>
      </div>
      <div class="url">usephylax.com</div>
    </div>
  </div>
</div>
</body>
</html>
