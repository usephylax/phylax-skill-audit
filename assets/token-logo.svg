<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <radialGradient id="bg" cx="256" cy="216" r="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#16263f"/>
      <stop offset="0.6" stop-color="#0c1018"/>
      <stop offset="1" stop-color="#070a0f"/>
    </radialGradient>
    <linearGradient id="edge" x1="256" y1="120" x2="256" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5ADcFF"/>
      <stop offset="1" stop-color="#2F6BFF"/>
    </linearGradient>
    <radialGradient id="core" cx="256" cy="250" r="170" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#13233d"/>
      <stop offset="1" stop-color="#0b1018"/>
    </radialGradient>
    <radialGradient id="glow" cx="256" cy="248" r="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#48D8FF" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#48D8FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- full-bleed disc background (safe for circular crop) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="256" cy="248" r="120" fill="url(#glow)"/>

  <!-- shield -->
  <g transform="translate(256 256) scale(7.3) translate(-16 -16)">
    <path d="M16 2 L28 6 V15 C28 23 22.5 27.5 16 30 C9.5 27.5 4 23 4 15 V6 Z"
          fill="url(#core)" stroke="url(#edge)" stroke-width="2" stroke-linejoin="round"/>
    <!-- audit aperture -->
    <circle cx="16" cy="14.5" r="5" fill="none" stroke="#3B82F6" stroke-width="1.9"/>
    <circle cx="16" cy="14.5" r="1.7" fill="#5ADcFF"/>
    <!-- reticle ticks -->
    <line x1="16" y1="7" x2="16" y2="9.4" stroke="#5ADcFF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="16" y1="19.6" x2="16" y2="22" stroke="#5ADcFF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="8.4" y1="14.5" x2="10.8" y2="14.5" stroke="#5ADcFF" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="21.2" y1="14.5" x2="23.6" y2="14.5" stroke="#5ADcFF" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
