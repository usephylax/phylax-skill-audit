<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <radialGradient id="tlbg" cx="256" cy="200" r="330" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d6ff33"/>
      <stop offset="0.65" stop-color="#c4f82a"/>
      <stop offset="1" stop-color="#a8e015"/>
    </radialGradient>
  </defs>

  <!-- full-bleed lime background (safe for circular crop) -->
  <rect width="512" height="512" fill="url(#tlbg)"/>

  <!-- bold guardian shield -->
  <g transform="translate(256 262) scale(9.6) translate(-16 -16)">
    <path d="M16 1.5 L28.5 5.6 V15 C28.5 23.4 22.7 28.1 16 30.5 C9.3 28.1 3.5 23.4 3.5 15 V5.6 Z"
          fill="#0a0a0a"/>

    <!-- audit aperture — the scan eye -->
    <circle cx="16" cy="14.3" r="5.4" fill="none" stroke="#c4f82a" stroke-width="2.1"/>
    <circle cx="16" cy="14.3" r="2" fill="#d6ff33"/>

    <!-- reticle ticks (thicker for small-size legibility) -->
    <line x1="16" y1="6.4" x2="16" y2="9" stroke="#c4f82a" stroke-width="2" stroke-linecap="round"/>
    <line x1="16" y1="19.6" x2="16" y2="22.2" stroke="#c4f82a" stroke-width="2" stroke-linecap="round"/>
    <line x1="8.1" y1="14.3" x2="10.7" y2="14.3" stroke="#c4f82a" stroke-width="2" stroke-linecap="round"/>
    <line x1="21.3" y1="14.3" x2="23.9" y2="14.3" stroke="#c4f82a" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
