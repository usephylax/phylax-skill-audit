<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1500" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A0F18"/>
      <stop offset="0.55" stop-color="#070A11"/>
      <stop offset="1" stop-color="#05070B"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#48D8FF"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <radialGradient id="core" cx="32" cy="28" r="26" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#11203A"/>
      <stop offset="1" stop-color="#0E0E14"/>
    </radialGradient>
    <radialGradient id="rightglow" cx="1080" cy="250" r="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1A3A66" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#1A3A66" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1500" height="500" fill="url(#bg)"/>
  <circle cx="1080" cy="250" r="430" fill="url(#rightglow)"/>

  <!-- faint grid -->
  <g stroke="#121826" stroke-width="1" opacity="0.55">
    <line x1="0" y1="125" x2="1500" y2="125"/>
    <line x1="0" y1="250" x2="1500" y2="250"/>
    <line x1="0" y1="375" x2="1500" y2="375"/>
    <line x1="500" y1="0" x2="500" y2="500"/>
    <line x1="750" y1="0" x2="750" y2="500"/>
    <line x1="1000" y1="0" x2="1000" y2="500"/>
  </g>

  <!-- scan sweep line across center -->
  <line x1="520" y1="250" x2="1340" y2="250" stroke="#48D8FF" stroke-width="1.5" stroke-dasharray="3 6" opacity="0.3"/>

  <!-- Logo + wordmark, kept in the safe central band -->
  <g transform="translate(560 158)">
    <!-- shield mark -->
    <g transform="scale(2.85)">
      <path d="M32 3 L55 11 V29 C55 44 45.5 54 32 60 C18.5 54 9 44 9 29 V11 Z"
            fill="url(#core)" stroke="url(#edge)" stroke-width="2.5" stroke-linejoin="round"/>
      <circle cx="32" cy="30" r="9.5" fill="none" stroke="#3B82F6" stroke-width="2"/>
      <circle cx="32" cy="30" r="5.5" fill="none" stroke="#48D8FF" stroke-width="1.4"/>
      <circle cx="32" cy="30" r="2" fill="#48D8FF"/>
      <line x1="32" y1="17" x2="32" y2="22.5" stroke="#48D8FF" stroke-width="1.6" stroke-linecap="round"/>
      <line x1="32" y1="37.5" x2="32" y2="43" stroke="#48D8FF" stroke-width="1.6" stroke-linecap="round"/>
      <line x1="19" y1="30" x2="24.5" y2="30" stroke="#48D8FF" stroke-width="1.6" stroke-linecap="round"/>
      <line x1="39.5" y1="30" x2="45" y2="30" stroke="#48D8FF" stroke-width="1.6" stroke-linecap="round"/>
      <path d="M27 47.5 L30.5 51 L38 43.5" fill="none" stroke="#48D8FF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- wordmark -->
    <text x="210" y="92" font-family="'IBM Plex Mono','DejaVu Sans Mono',monospace" font-size="74" font-weight="600" fill="#E8E8EC">phylax</text>
    <text x="214" y="138" font-family="Inter,'DejaVu Sans',sans-serif" font-size="23" font-weight="500" fill="#8888A0" letter-spacing="0.5">Pre-install risk verdicts for agent skills</text>
  </g>

  <!-- verdict chips bottom-center -->
  <g font-family="'IBM Plex Mono','DejaVu Sans Mono',monospace" font-size="22" font-weight="700" transform="translate(770 360)">
    <rect x="0" y="0" width="112" height="42" rx="6" fill="#10B98118" stroke="#10B98140"/>
    <text x="56" y="28" text-anchor="middle" fill="#34D399">ALLOW</text>
    <rect x="128" y="0" width="100" height="42" rx="6" fill="#EAB30818" stroke="#EAB30840"/>
    <text x="178" y="28" text-anchor="middle" fill="#FACC15">WARN</text>
    <rect x="244" y="0" width="98" height="42" rx="6" fill="#EF444418" stroke="#EF444440"/>
    <text x="293" y="28" text-anchor="middle" fill="#F87171">DENY</text>
  </g>
</svg>
